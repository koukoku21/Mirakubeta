name: miraku
description: "Miraku — бьюти-приложение для Астаны"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Secure storage (JWT)
  flutter_secure_storage: ^9.2.2

  # Icons
  phosphor_flutter: ^2.1.0

  # Swipe cards (C-1 лента)
  flutter_card_swiper: ^7.0.0

  # Location
  geolocator: ^13.0.2

  # Localization
  intl: ^0.20.2

  # WebSocket (чат)
  socket_io_client: ^2.0.3+1

  # Push notifications (FCM)
  firebase_messaging: ^15.1.6
  firebase_core: ^3.8.1

  # Image picker (портфолио мастера)
  image_picker: ^1.1.2

  # Utils
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.7
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Mulish
      fonts:
        - asset: assets/fonts/Mulish-Light.ttf
          weight: 300
        - asset: assets/fonts/Mulish-Regular.ttf
          weight: 400
        - asset: assets/fonts/Mulish-Medium.ttf
          weight: 500
        - asset: assets/fonts/Mulish-SemiBold.ttf
          weight: 600

    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
